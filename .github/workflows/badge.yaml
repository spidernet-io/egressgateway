name: Badge Status

env:
  CODESTATUSSCRIPT: "./tools/golang/codeCoverage.sh"
  E2ECOVERSTATUSSCRIPT: "./tools/golang/e2ecover.sh"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-badges:
    name: Update Badges
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install cloc
        run: sudo apt-get update -y && sudo apt-get install -y cloc bc

      - name: Collect Metrics
        shell: bash
        run: |
          CODE_LINES=$(${CODESTATUSSCRIPT} --code-lines)
          COMMENT_PERCENTAGE=$(${CODESTATUSSCRIPT} --comment-percent)
          E2E_STATUS=$(${E2ECOVERSTATUSSCRIPT})

          echo "CODE_LINES=${CODE_LINES}" >> $GITHUB_ENV
          echo "COMMENT_PERCENTAGE=${COMMENT_PERCENTAGE}" >> $GITHUB_ENV
          echo "E2E_STATUS=${E2E_STATUS}" >> $GITHUB_ENV

      - name: Generate badge JSON
        run: |
          mkdir -p badges

          # e2e color
          if [ "$E2E_STATUS" = "passing" ]; then
            E2E_COLOR="green"
          else
            E2E_COLOR="red"
          fi

          # comment color
          if (( $(echo "$COMMENT_PERCENTAGE > 80" | bc -l) )); then
            COMMENT_COLOR="green"
          elif (( $(echo "$COMMENT_PERCENTAGE > 50" | bc -l) )); then
            COMMENT_COLOR="yellow"
          else
            COMMENT_COLOR="red"
          fi

          # code lines badge
          cat > badges/code-lines.json <<EOF
          {
            "schemaVersion": 1,
            "label": "code lines",
            "message": "${CODE_LINES}",
            "color": "blue"
          }
          EOF

          # comments badge
          cat > badges/comments.json <<EOF
          {
            "schemaVersion": 1,
            "label": "comments",
            "message": "${COMMENT_PERCENTAGE}%",
            "color": "${COMMENT_COLOR}"
          }
          EOF

          # e2e badge
          cat > badges/e2e.json <<EOF
          {
            "schemaVersion": 1,
            "label": "e2e",
            "message": "${E2E_STATUS}",
            "color": "${E2E_COLOR}"
          }
          EOF

      - name: Deploy badges
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: badges
          publish_dir: ./badges
          force_orphan: true